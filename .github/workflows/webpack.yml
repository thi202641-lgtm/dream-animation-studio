import React, { useState, useEffect, useRef } from 'react';
import { StoryPage } from '../types';
import { X, Sparkles, Star, CheckCircle2, Gift, Moon, Wand2, Volume2, RefreshCw, Zap, Trophy, Heart } from 'lucide-react';
import { audioEngine } from '../services/audioEngine';

interface MinigameModalProps {
  page: StoryPage;
  onClose: () => void;
}

export const MinigameModal: React.FC<MinigameModalProps> = ({ page, onClose }) => {
  // Difficulty & General States
  const [difficultyLevel, setDifficultyLevel] = useState<'easy' | 'challenge'>('challenge');
  const [score, setScore] = useState(0);
  const [targetScore, setTargetScore] = useState(6);
  const [isCompleted, setIsCompleted] = useState(false);
  const [feedbackText, setFeedbackText] = useState<string>('');

  // -------------------------------------------------------------
  // GAME 1: Catch Floating Moving Bubbles (Physics Drift)
  // -------------------------------------------------------------
  const [floatingBubbles, setFloatingBubbles] = useState<
    { id: number; x: number; y: number; vx: number; vy: number; symbol: string; points: number; color: string }[]
  >([]);

  // -------------------------------------------------------------
  // GAME 2: Simon-Says Musical Constellation Memory
  // -------------------------------------------------------------
  const constellationStars = [
    { id: 0, x: 22, y: 25, label: 'Đô', color: '#EF4444', freq: 261.63 },
    { id: 1, x: 50, y: 18, label: 'Rê', color: '#F59E0B', freq: 293.66 },
    { id: 2, x: 78, y: 28, label: 'Mi', color: '#10B981', freq: 329.63 },
    { id: 3, x: 75, y: 68, label: 'Son', color: '#06B6D4', freq: 392.00 },
    { id: 4, x: 50, y: 78, label: 'La', color: '#8B5CF6', freq: 440.00 },
    { id: 5, x: 22, y: 65, label: 'Đố', color: '#EC4899', freq: 523.25 },
  ];
  const [sequence, setSequence] = useState<number[]>([]);
  const [userStep, setUserStep] = useState<number>(0);
  const [isDemonstrating, setIsDemonstrating] = useState<boolean>(false);
  const [activeStarHighlight, setActiveStarHighlight] = useState<number | null>(null);
  const [constellationRounds, setConstellationRounds] = useState(1);

  // -------------------------------------------------------------
  // GAME 3: Dream Pair Memory Match
  // -------------------------------------------------------------
  interface MemoryCard {
    id: number;
    pairId: number;
    icon: string;
    name: string;
    isFlipped: boolean;
    isMatched: boolean;
  }
  const [memoryCards, setMemoryCards] = useState<MemoryCard[]>([]);
  const [selectedCardIndices, setSelectedCardIndices] = useState<number[]>([]);

  // -------------------------------------------------------------
  // GAME 4: Musical Xylophone Rhythm Master
  // -------------------------------------------------------------
  const xylophoneKeys = [
    { id: 0, noteName: 'Đô', freq: 261.63, color: 'from-pink-500 to-rose-400', symbol: '🌸' },
    { id: 1, noteName: 'Rê', freq: 293.66, color: 'from-amber-400 to-orange-400', symbol: '⭐' },
    { id: 2, noteName: 'Mi', freq: 329.63, color: 'from-yellow-400 to-lime-400', symbol: '🌟' },
    { id: 3, noteName: 'Pha', freq: 349.23, color: 'from-emerald-400 to-teal-400', symbol: '🍃' },
    { id: 4, noteName: 'Son', freq: 392.00, color: 'from-sky-400 to-blue-500', symbol: '💧' },
    { id: 5, noteName: 'La', freq: 440.00, color: 'from-purple-500 to-indigo-500', symbol: '💜' }
  ];
  const [rhythmSequence, setRhythmSequence] = useState<number[]>([]);
  const [rhythmUserStep, setRhythmUserStep] = useState<number>(0);
  const [isPlayingRhythm, setIsPlayingRhythm] = useState<boolean>(false);
  const [activeKeyHighlight, setActiveKeyHighlight] = useState<number | null>(null);

  // -------------------------------------------------------------
  // GAME 5: Catch Falling Dream Objects (Basket Catcher)
  // -------------------------------------------------------------
  const [fallingObjects, setFallingObjects] = useState<
    { id: number; x: number; y: number; speed: number; icon: string; points: number }[]
  >([]);
  const [basketX, setBasketX] = useState<number>(50);

  // Animation frame ref for smooth physics
  const animFrameRef = useRef<number | null>(null);

  // Initializing randomized minigame data based on page minigame type & difficulty
  useEffect(() => {
    initRandomizedGame();
    return () => {
      if (animFrameRef.current) cancelAnimationFrame(animFrameRef.current);
    };
  }, [page, difficultyLevel]);

  const initRandomizedGame = () => {
    setIsCompleted(false);
    setScore(0);
    setFeedbackText('');

    if (page.minigame.type === 'catch_notes') {
      // Game 1: Generate moving floating bubbles
      const count = difficultyLevel === 'challenge' ? 10 : 6;
      setTargetScore(difficultyLevel === 'challenge' ? 8 : 5);

      const symbols = ['♩', '♪', '♫', '🫧', '⭐', '♬', '🎼', '✨', '🌟'];
      const colors = ['#FDE047', '#EC4899', '#A855F7', '#60A5FA', '#34D399', '#F472B6'];

      const newBubbles = Array.from({ length: count }).map((_, i) => ({
        id: Math.random(),
        x: 10 + Math.random() * 75,
        y: 15 + Math.random() * 65,
        vx: (Math.random() - 0.5) * (difficultyLevel === 'challenge' ? 0.35 : 0.15),
        vy: (Math.random() - 0.5) * (difficultyLevel === 'challenge' ? 0.35 : 0.15),
        symbol: symbols[Math.floor(Math.random() * symbols.length)],
        points: Math.random() > 0.7 ? 2 : 1, // Bonus golden bubbles
        color: colors[Math.floor(Math.random() * colors.length)]
      }));
      setFloatingBubbles(newBubbles);
    } else if (page.minigame.type === 'connect_lights') {
      // Game 2: Simon-Says Constellation Memory
      setConstellationRounds(1);
      setTargetScore(difficultyLevel === 'challenge' ? 3 : 2);
      startNewConstellationRound(1);
    } else if (page.minigame.type === 'treasure_draw') {
      // Game 3: Memory Card Pair Match (shuffled)
      const basePairs = [
        { icon: '🐰', name: 'Thỏ Hồng' },
        { icon: '💎', name: 'Kim Cương' },
        { icon: '🚂', name: 'Tàu Mây' },
        { icon: '👑', name: 'Vương Miện' },
        { icon: '🔮', name: 'Cầu Phép' },
        { icon: '🌙', name: 'Trăng Vàng' }
      ];
      const selectedPairs = basePairs.slice(0, difficultyLevel === 'challenge' ? 6 : 4);
      setTargetScore(selectedPairs.length);

      const cards: MemoryCard[] = [];
      selectedPairs.forEach((pair, pairIdx) => {
        cards.push(
          { id: Math.random(), pairId: pairIdx, icon: pair.icon, name: pair.name, isFlipped: false, isMatched: false },
          { id: Math.random(), pairId: pairIdx, icon: pair.icon, name: pair.name, isFlipped: false, isMatched: false }
        );
      });
      // Shuffle cards randomly
      setMemoryCards(cards.sort(() => Math.random() - 0.5));
      setSelectedCardIndices([]);
    } else if (page.minigame.type === 'rhythm_dance') {
      // Game 4: Xylophone Melody Repeat
      setTargetScore(difficultyLevel === 'challenge' ? 3 : 2);
      startNewRhythmRound(difficultyLevel === 'challenge' ? 4 : 3);
    } else if (page.minigame.type === 'send_hearts') {
      // Game 5: Falling Dream Object Catch
      setTargetScore(difficultyLevel === 'challenge' ? 8 : 5);
      const items = ['🛏️', '💖', '⭐', '☁️', '🌙', '🧸'];
      const newFalling = Array.from({ length: 8 }).map((_, i) => ({
        id: Math.random(),
        x: 10 + Math.random() * 80,
        y: -10 - Math.random() * 80,
        speed: 0.25 + Math.random() * (difficultyLevel === 'challenge' ? 0.35 : 0.2),
        icon: items[Math.floor(Math.random() * items.length)],
        points: 1
      }));
      setFallingObjects(newFalling);
    }
  };

  // Trigger Win Condition
  const checkCompletion = (currentScore: number, required: number) => {
    if (currentScore >= required && !isCompleted) {
      setIsCompleted(true);
      audioEngine.playHeartChime();
      setTimeout(() => {
        onClose();
      }, 2600);
    }
  };

  // =============================================================
  // GAME 1 LOGIC: Floating Bubbles Movement Physics
  // =============================================================
  useEffect(() => {
    if (page.minigame.type !== 'catch_notes' || isCompleted) return;

    const updatePhysics = () => {
      setFloatingBubbles((prev) =>
        prev.map((b) => {
          let newX = b.x + b.vx;
          let newY = b.y + b.vy;
          let newVx = b.vx;
          let newVy = b.vy;

          if (newX < 8 || newX > 88) newVx = -newVx;
          if (newY < 12 || newY > 82) newVy = -newVy;

          return { ...b, x: newX, y: newY, vx: newVx, vy: newVy };
        })
      );
      animFrameRef.current = requestAnimationFrame(updatePhysics);
    };

    animFrameRef.current = requestAnimationFrame(updatePhysics);
    return () => {
      if (animFrameRef.current) cancelAnimationFrame(animFrameRef.current);
    };
  }, [page, isCompleted]);

  const handlePopBubble = (id: number, points: number) => {
    setFloatingBubbles((prev) => prev.filter((b) => b.id !== id));
    audioEngine.playBubbleNote(score);
    const newScore = score + points;
    setScore(newScore);

    if (points > 1) {
      setFeedbackText('+2 Điểm Thần Kỳ! 🌟');
      setTimeout(() => setFeedbackText(''), 1000);
    }
    checkCompletion(newScore, targetScore);
  };

  // =============================================================
  // GAME 2 LOGIC: Simon-Says Musical Star Constellation
  // =============================================================
  const startNewConstellationRound = (roundNum: number) => {
    setIsDemonstrating(true);
    setUserStep(0);
    setFeedbackText(`Vòng ${roundNum}: Lắng nghe giai điệu sao...`);

    const seqLength = roundNum + 2; // e.g. Round 1: 3 notes, Round 2: 4 notes, Round 3: 5 notes
    const newSeq: number[] = [];
    for (let i = 0; i < seqLength; i++) {
      newSeq.push(Math.floor(Math.random() * constellationStars.length));
    }
    setSequence(newSeq);

    // Playback demonstration
    newSeq.forEach((starIdx, i) => {
      setTimeout(() => {
        const star = constellationStars[starIdx];
        setActiveStarHighlight(starIdx);
        audioEngine.playXylophoneKey(star.freq);

        setTimeout(() => setActiveStarHighlight(null), 450);

        if (i === newSeq.length - 1) {
          setTimeout(() => {
            setIsDemonstrating(false);
            setFeedbackText('Đến lượt bé lặp lại giai điệu!');
          }, 600);
        }
      }, (i + 1) * 750);
    });
  };

  const handleTapConstellationStar = (starIdx: number) => {
    if (isDemonstrating || isCompleted) return;

    const star = constellationStars[starIdx];
    audioEngine.playXylophoneKey(star.freq);
    setActiveStarHighlight(starIdx);
    setTimeout(() => setActiveStarHighlight(null), 300);

    // Check if correct in sequence
    if (sequence[userStep] === starIdx) {
      const nextStep = userStep + 1;
      setUserStep(nextStep);

      if (nextStep === sequence.length) {
        // Round completed!
        audioEngine.playStarTwinkle();
        const newScore = score + 1;
        setScore(newScore);

        if (newScore >= targetScore) {
          setFeedbackText('Hoàn thành xuất sắc chòm sao mơ!');
          checkCompletion(newScore, targetScore);
        } else {
          setFeedbackText('Chính xác! Chuẩn bị vòng tiếp theo...');
          setTimeout(() => {
            setConstellationRounds((r) => r + 1);
            startNewConstellationRound(constellationRounds + 1);
          }, 1200);
        }
      }
    } else {
      // Wrong note
      audioEngine.playTypewriterClick();
      setFeedbackText('Chưa đúng rồi, bé hãy nghe lại nhé!');
      setTimeout(() => {
        replayConstellationDemo();
      }, 1000);
    }
  };

  const replayConstellationDemo = () => {
    if (isCompleted || sequence.length === 0) return;
    setIsDemonstrating(true);
    setUserStep(0);
    setFeedbackText('Nghe lại giai điệu chòm sao...');

    sequence.forEach((starIdx, i) => {
      setTimeout(() => {
        const star = constellationStars[starIdx];
        setActiveStarHighlight(starIdx);
        audioEngine.playXylophoneKey(star.freq);
        setTimeout(() => setActiveStarHighlight(null), 450);

        if (i === sequence.length - 1) {
          setTimeout(() => {
            setIsDemonstrating(false);
            setFeedbackText('Thử lại nào bé yêu!');
          }, 600);
        }
      }, (i + 1) * 700);
    });
  };

  // =============================================================
  // GAME 3 LOGIC: Memory Card Matching Game
  // =============================================================
  const handleCardClick = (index: number) => {
    if (
      isCompleted ||
      selectedCardIndices.length >= 2 ||
      memoryCards[index].isFlipped ||
      memoryCards[index].isMatched
    ) {
      return;
    }

    audioEngine.playTypewriterClick();

    // Flip the clicked card
    const updatedCards = [...memoryCards];
    updatedCards[index].isFlipped = true;
    setMemoryCards(updatedCards);

    const newSelected = [...selectedCardIndices, index];
    setSelectedCardIndices(newSelected);

    if (newSelected.length === 2) {
      const [idx1, idx2] = newSelected;
      if (updatedCards[idx1].pairId === updatedCards[idx2].pairId) {
        // Match found!
        audioEngine.playTreasureMagic(score);
        updatedCards[idx1].isMatched = true;
        updatedCards[idx2].isMatched = true;
        setMemoryCards(updatedCards);
        setSelectedCardIndices([]);

        const newScore = score + 1;
        setScore(newScore);
        setFeedbackText(`Khám phá: ${updatedCards[idx1].name}! ✨`);
        checkCompletion(newScore, targetScore);
      } else {
        // Not matched - flip back
        setTimeout(() => {
          const resetCards = [...memoryCards];
          resetCards[idx1].isFlipped = false;
          resetCards[idx2].isFlipped = false;
          setMemoryCards(resetCards);
          setSelectedCardIndices([]);
        }, 900);
      }
    }
  };

  // =============================================================
  // GAME 4 LOGIC: Xylophone Rhythm Master
  // =============================================================
  const startNewRhythmRound = (noteCount: number) => {
    setIsPlayingRhythm(true);
    setRhythmUserStep(0);
    setFeedbackText(`Lắng nghe bản nhạc ${noteCount} nốt...`);

    const newSeq: number[] = [];
    for (let i = 0; i < noteCount; i++) {
      newSeq.push(Math.floor(Math.random() * xylophoneKeys.length));
    }
    setRhythmSequence(newSeq);

    newSeq.forEach((keyIdx, i) => {
      setTimeout(() => {
        const key = xylophoneKeys[keyIdx];
        setActiveKeyHighlight(keyIdx);
        audioEngine.playXylophoneKey(key.freq);
        setTimeout(() => setActiveKeyHighlight(null), 400);

        if (i === newSeq.length - 1) {
          setTimeout(() => {
            setIsPlayingRhythm(false);
            setFeedbackText('Đến lượt bé gõ đàn lại nốt nhạc!');
          }, 500);
        }
      }, (i + 1) * 700);
    });
  };

  const handleXylophoneKeyTap = (keyIdx: number) => {
    if (isPlayingRhythm || isCompleted) return;

    const key = xylophoneKeys[keyIdx];
    audioEngine.playXylophoneKey(key.freq);
    setActiveKeyHighlight(keyIdx);
    setTimeout(() => setActiveKeyHighlight(null), 250);

    if (rhythmSequence[rhythmUserStep] === keyIdx) {
      const nextStep = rhythmUserStep + 1;
      setRhythmUserStep(nextStep);

      if (nextStep === rhythmSequence.length) {
        audioEngine.playStarTwinkle();
        const newScore = score + 1;
        setScore(newScore);

        if (newScore >= targetScore) {
          setFeedbackText('Bé là nghệ sĩ dương cầm tuyệt vời!');
          checkCompletion(newScore, targetScore);
        } else {
          setFeedbackText('Xuất sắc! Chuẩn bị giai điệu tiếp theo...');
          setTimeout(() => {
            startNewRhythmRound(difficultyLevel === 'challenge' ? 5 : 4);
          }, 1200);
        }
      }
    } else {
      audioEngine.playTypewriterClick();
      setFeedbackText('Tiếng đàn chưa khớp, thử lại nào!');
      setTimeout(() => {
        replayRhythmDemo();
      }, 900);
    }
  };

  const replayRhythmDemo = () => {
    if (isCompleted || rhythmSequence.length === 0) return;
    setIsPlayingRhythm(true);
    setRhythmUserStep(0);
    setFeedbackText('Đang phát lại bản nhạc...');

    rhythmSequence.forEach((keyIdx, i) => {
      setTimeout(() => {
        const key = xylophoneKeys[keyIdx];
        setActiveKeyHighlight(keyIdx);
        audioEngine.playXylophoneKey(key.freq);
        setTimeout(() => setActiveKeyHighlight(null), 400);

        if (i === rhythmSequence.length - 1) {
          setTimeout(() => {
            setIsPlayingRhythm(false);
            setFeedbackText('Gõ lại đúng nốt nhạc nhé!');
          }, 500);
        }
      }, (i + 1) * 650);
    });
  };

  // =============================================================
  // GAME 5 LOGIC: Falling Dream Objects (Physics Loop)
  // =============================================================
  useEffect(() => {
    if (page.minigame.type !== 'send_hearts' || isCompleted) return;

    const updateFalling = () => {
      setFallingObjects((prev) =>
        prev.map((obj) => {
          let newY = obj.y + obj.speed;
          if (newY > 105) {
            // Reset to top at random x
            newY = -15;
            return { ...obj, y: newY, x: 10 + Math.random() * 80 };
          }
          return { ...obj, y: newY };
        })
      );
      animFrameRef.current = requestAnimationFrame(updateFalling);
    };

    animFrameRef.current = requestAnimationFrame(updateFalling);
    return () => {
      if (animFrameRef.current) cancelAnimationFrame(animFrameRef.current);
    };
  }, [page, isCompleted]);

  const handleCatchFallingObject = (id: number) => {
    audioEngine.playBedtimeHugSound();
    setFallingObjects((prev) =>
      prev.map((obj) => (obj.id === id ? { ...obj, y: -20, x: 10 + Math.random() * 80 } : obj))
    );
    const newScore = score + 1;
    setScore(newScore);
    checkCompletion(newScore, targetScore);
  };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-3 sm:p-4 bg-slate-950/90 backdrop-blur-md animate-fade-in">
      <div className="relative w-full max-w-xl bg-slate-900 border border-amber-400/40 rounded-3xl p-4 sm:p-6 text-amber-50 shadow-2xl overflow-hidden flex flex-col justify-between">
        {/* Header Bar */}
        <div className="flex items-center justify-between border-b border-amber-500/20 pb-2.5 mb-2.5">
          <div className="flex items-center gap-2">
            <Trophy className="w-5 h-5 text-amber-300 animate-bounce" />
            <div>
              <h2 className="text-sm sm:text-base font-bold font-serif text-amber-200">
                {page.minigame.title}
              </h2>
              <span className="text-[10px] text-amber-300/80 font-sans">
                Thách thức trí tuệ dành cho bé 7 tuổi
              </span>
            </div>
          </div>

          {/* Controls: Difficulty Toggle & Refresh & Close */}
          <div className="flex items-center gap-2">
            <button
              onClick={() => setDifficultyLevel(difficultyLevel === 'easy' ? 'challenge' : 'easy')}
              className={`px-2.5 py-1 rounded-full text-[10px] font-bold border transition-all cursor-pointer flex items-center gap-1 ${
                difficultyLevel === 'challenge'
                  ? 'bg-amber-400 text-slate-950 border-amber-200 shadow-md'
                  : 'bg-slate-800 text-amber-300 border-amber-400/30'
              }`}
              title="Chuyển chế độ độ khó"
            >
              <Zap className="w-3 h-3" />
              <span>{difficultyLevel === 'challenge' ? 'Thách Thức 7t' : 'Dễ Thư Giãn'}</span>
            </button>

            <button
              onClick={initRandomizedGame}
              className="p-1.5 bg-slate-800 hover:bg-slate-700 text-amber-300 rounded-full border border-amber-400/30 transition-all cursor-pointer"
              title="Tải màn chơi ngẫu nhiên mới"
            >
              <RefreshCw className="w-3.5 h-3.5" />
            </button>

            <button
              id="btn-close-minigame"
              onClick={onClose}
              className="p-1.5 bg-slate-800 hover:bg-slate-700 text-amber-200 rounded-full border border-amber-300/30 transition-all cursor-pointer"
            >
              <X className="w-4 h-4" />
            </button>
          </div>
        </div>

        {/* Instruction & Dynamic Feedback */}
        <div className="flex items-center justify-between mb-2 px-1">
          <p className="text-xs text-amber-100/90 font-serif leading-tight">
            {page.minigame.instruction}
          </p>
          {feedbackText && (
            <span className="text-[11px] font-bold text-amber-300 bg-amber-400/10 border border-amber-400/30 px-2.5 py-0.5 rounded-full animate-pulse whitespace-nowrap">
              {feedbackText}
            </span>
          )}
        </div>

        {/* Main Interactive Game Arena */}
        <div className="relative w-full h-72 sm:h-80 bg-slate-950/90 rounded-2xl border border-amber-500/20 overflow-hidden flex items-center justify-center select-none shadow-inner">
          {/* Victory Overlay */}
          {isCompleted && (
            <div className="absolute inset-0 z-30 bg-amber-950/95 backdrop-blur-md flex flex-col items-center justify-center gap-3 animate-fade-in text-center p-6">
              <CheckCircle2 className="w-16 h-16 text-amber-300 animate-bounce" />
              <h3 className="text-xl font-bold text-amber-200 font-serif">
                Thành Công Rực Rỡ! Bé Giỏi Lắm!
              </h3>
              <p className="text-xs text-amber-100/90 font-serif max-w-sm">
                Bé đã vượt qua thử thách trí tuệ nâng cao một cách xuất sắc. Giấc mơ đẹp đang chờ đón bé!
              </p>
            </div>
          )}

          {/* GAME 1: Physics Floating Bubbles */}
          {page.minigame.type === 'catch_notes' && (
            <div className="relative w-full h-full">
              {floatingBubbles.map((b) => (
                <button
                  key={b.id}
                  onClick={() => handlePopBubble(b.id, b.points)}
                  style={{ left: `${b.x}%`, top: `${b.y}%`, color: b.color }}
                  className={`absolute transform -translate-x-1/2 -translate-y-1/2 p-3 bg-slate-900/80 border rounded-full text-2xl sm:text-3xl transition-transform hover:scale-125 focus:outline-none shadow-lg active:scale-90 cursor-pointer ${
                    b.points > 1
                      ? 'border-amber-300 ring-2 ring-amber-300/80 animate-pulse'
                      : 'border-amber-400/40'
                  }`}
                >
                  {b.symbol}
                  {b.points > 1 && (
                    <span className="absolute -top-1 -right-1 text-[9px] bg-amber-400 text-slate-950 font-bold px-1 rounded-full">
                      +2
                    </span>
                  )}
                </button>
              ))}
            </div>
          )}

          {/* GAME 2: Musical Constellation Simon-Says */}
          {page.minigame.type === 'connect_lights' && (
            <div className="relative w-full h-full flex items-center justify-center">
              {/* Central Moon Info */}
              <div className="w-24 h-24 rounded-full bg-amber-400/10 border border-amber-300/30 flex flex-col items-center justify-center text-center p-2">
                <Moon className="w-6 h-6 text-amber-300 fill-amber-300/30 mb-1" />
                <span className="text-[10px] text-amber-200 font-bold font-serif">
                  {isDemonstrating ? 'Lắng Nghe...' : `Vòng ${constellationRounds}/${targetScore}`}
                </span>
                {!isDemonstrating && (
                  <button
                    onClick={replayConstellationDemo}
                    className="mt-1 flex items-center gap-0.5 text-[9px] bg-slate-800 text-amber-300 px-2 py-0.5 rounded-full border border-amber-400/30 hover:bg-slate-700"
                  >
                    <Volume2 className="w-2.5 h-2.5" />
                    <span>Nghe lại</span>
                  </button>
                )}
              </div>

              {/* Star Nodes */}
              {constellationStars.map((star) => {
                const isActive = activeStarHighlight === star.id;
                return (
                  <button
                    key={star.id}
                    onClick={() => handleTapConstellationStar(star.id)}
                    disabled={isDemonstrating}
                    style={{ left: `${star.x}%`, top: `${star.y}%` }}
                    className={`absolute transform -translate-x-1/2 -translate-y-1/2 p-3 rounded-full border transition-all duration-300 cursor-pointer ${
                      isActive
                        ? 'bg-amber-300 text-slate-950 border-amber-100 scale-140 shadow-2xl shadow-amber-300'
                        : 'bg-slate-900 border-amber-400/50 text-amber-200 hover:scale-125'
                    }`}
                  >
                    <Star className={`w-5 h-5 ${isActive ? 'fill-slate-950' : 'fill-amber-300/40'}`} />
                    <span className="absolute -bottom-4 left-1/2 transform -translate-x-1/2 text-[9px] font-bold text-amber-300">
                      {star.label}
                    </span>
                  </button>
                );
              })}
            </div>
          )}

          {/* GAME 3: Dream Pair Memory Matching */}
          {page.minigame.type === 'treasure_draw' && (
            <div className="grid grid-cols-4 gap-2.5 p-4 w-full h-full items-center justify-center">
              {memoryCards.map((card, idx) => (
                <button
                  key={card.id}
                  onClick={() => handleCardClick(idx)}
                  className={`h-20 sm:h-24 rounded-2xl border p-2 flex flex-col items-center justify-center text-center font-serif transition-all duration-300 cursor-pointer ${
                    card.isFlipped || card.isMatched
                      ? 'bg-gradient-to-b from-amber-900/80 to-slate-900 border-amber-300 text-amber-200 scale-105 shadow-lg'
                      : 'bg-slate-900/90 border-amber-500/30 text-amber-100/70 hover:bg-slate-800 hover:scale-105'
                  }`}
                >
                  {card.isFlipped || card.isMatched ? (
                    <>
                      <span className="text-2xl sm:text-3xl mb-1">{card.icon}</span>
                      <span className="text-[9px] font-bold text-amber-200">{card.name}</span>
                    </>
                  ) : (
                    <Gift className="w-7 h-7 text-amber-400/80" />
                  )}
                </button>
              ))}
            </div>
          )}

          {/* GAME 4: Musical Xylophone Rhythm Master */}
          {page.minigame.type === 'rhythm_dance' && (
            <div className="flex flex-col items-center justify-around w-full h-full p-3">
              <div className="flex items-center gap-2 bg-slate-900/80 px-3 py-1 rounded-full border border-amber-400/30 text-xs text-amber-300 font-serif">
                <Wand2 className="w-3.5 h-3.5 text-amber-300" />
                <span>
                  {isPlayingRhythm ? 'Đang phát bản nhạc mẫu...' : 'Gõ đàn lặp lại chính xác nốt nhạc!'}
                </span>
                {!isPlayingRhythm && (
                  <button
                    onClick={replayRhythmDemo}
                    className="ml-2 px-2 py-0.5 bg-slate-800 text-[10px] text-amber-200 rounded-full border border-amber-400/30 hover:bg-slate-700"
                  >
                    Nghe lại
                  </button>
                )}
              </div>

              <div className="flex items-end justify-center gap-2 sm:gap-2.5 w-full max-w-md h-44">
                {xylophoneKeys.map((k, idx) => {
                  const isActive = activeKeyHighlight === idx;
                  return (
                    <button
                      key={k.id}
                      onClick={() => handleXylophoneKeyTap(idx)}
                      disabled={isPlayingRhythm}
                      className={`flex-1 rounded-2xl border transition-all duration-200 flex flex-col items-center justify-between p-2 cursor-pointer bg-gradient-to-t ${k.color} ${
                        isActive
                          ? 'ring-4 ring-amber-200 scale-110 shadow-2xl z-10'
                          : 'opacity-85 hover:opacity-100 hover:scale-105'
                      }`}
                      style={{ height: `${65 + idx * 6}%` }}
                    >
                      <span className="text-base sm:text-lg">{k.symbol}</span>
                      <span className="text-xs font-extrabold text-slate-950 font-serif bg-white/80 px-2 py-0.5 rounded-full shadow-sm">
                        {k.noteName}
                      </span>
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          {/* GAME 5: Falling Dream Objects Basket Catcher */}
          {page.minigame.type === 'send_hearts' && (
            <div className="relative w-full h-full overflow-hidden">
              {fallingObjects.map((obj) => (
                <button
                  key={obj.id}
                  onClick={() => handleCatchFallingObject(obj.id)}
                  style={{ left: `${obj.x}%`, top: `${obj.y}%` }}
                  className="absolute transform -translate-x-1/2 -translate-y-1/2 p-2.5 bg-slate-900/80 border border-amber-400/50 rounded-2xl text-2xl sm:text-3xl transition-transform hover:scale-125 focus:outline-none shadow-lg active:scale-90 cursor-pointer"
                >
                  {obj.icon}
                </button>
              ))}
            </div>
          )}
        </div>

        {/* Footer Progress & Status Bar */}
        <div className="flex items-center justify-between mt-2.5 text-xs text-amber-300/80 font-serif">
          <span>Tiến độ thử thách: {score}/{targetScore}</span>
          <div className="flex items-center gap-1.5">
            {Array.from({ length: targetScore }).map((_, i) => (
              <span
                key={i}
                className={`w-3.5 h-3.5 rounded-full transition-all ${
                  i < score
                    ? 'bg-amber-400 scale-110 shadow-md shadow-amber-300/60'
                    : 'bg-slate-800 border border-amber-500/30'
                }`}
              />
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};
